<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- App icon: square dark bg + tightly centered CM mark, no wordmark. -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="#1A1410"/>

  <!-- 9 cols × 3 rows × 96px cells. Total mark: 864 × 288. Centered: (80, 368). -->
  <g transform="translate(80 368)" fill="#D97757">
    <!-- Row 0:  █▀▀ █▀▄▀█ -->
    <rect x="0"   y="0"   width="96" height="96"/>
    <rect x="96"  y="0"   width="96" height="48"/>
    <rect x="192" y="0"   width="96" height="48"/>
    <rect x="384" y="0"   width="96" height="96"/>
    <rect x="480" y="0"   width="96" height="48"/>
    <rect x="576" y="48"  width="96" height="48"/>
    <rect x="672" y="0"   width="96" height="48"/>
    <rect x="768" y="0"   width="96" height="96"/>

    <!-- Row 1:  █   █   █ -->
    <rect x="0"   y="96"  width="96" height="96"/>
    <rect x="384" y="96"  width="96" height="96"/>
    <rect x="768" y="96"  width="96" height="96"/>

    <!-- Row 2:  ▀▀▀ ▀   ▀ -->
    <rect x="0"   y="192" width="96" height="48"/>
    <rect x="96"  y="192" width="96" height="48"/>
    <rect x="192" y="192" width="96" height="48"/>
    <rect x="384" y="192" width="96" height="48"/>
    <rect x="768" y="192" width="96" height="48"/>
  </g>
</svg>
